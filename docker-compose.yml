# =============================================================================
# SECURITY: Secret Injection Required
# =============================================================================
# This compose file requires the following secrets to be set via environment
# variables or a .env file BEFORE starting services:
#
#   POSTGRES_PASSWORD   — Database password (required, no default)
#   REDIS_PASSWORD      — Redis AUTH password (required, no default)
#   PGADMIN_PASSWORD    — PgAdmin login password (required when using tools profile)
#   GRAFANA_ADMIN_PASSWORD — Grafana login password (required when using monitoring profile)
#   REDIS_COMMANDER_PASSWORD — Redis Commander password (required when using tools profile)
#   HEALTH_AUTH_TOKEN   — Bearer token for health endpoints (recommended)
#
# For local development ONLY, set DEV_MODE=true to relax some constraints.
# NEVER run with DEV_MODE=true in production.
#
# Image versions pinned 2026-02-16 — review monthly
# =============================================================================

version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: arbitrage_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arbitrage_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or environment}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: "UTC"
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - arbitrage_network

  redis:
    image: redis:7.4.2-alpine
    container_name: arbitrage_redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env or environment}
    ports:
      - "${REDIS_HOST_BIND:-127.0.0.1}:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env or environment}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - arbitrage_network

  # Arbitrage Bot
  arb-bot:
    build: .
    container_name: arbitrage_bot
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arbitrage_bot}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD}@redis:6379
      HEALTH_AUTH_TOKEN: ${HEALTH_AUTH_TOKEN:-}
      DEV_MODE: ${DEV_MODE:-false}
    ports:
      - "${ARB_BOT_HOST_BIND:-0.0.0.0}:${ARB_BOT_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - arbitrage_network

  # Liquidation Bot
  liquidation-bot:
    build: .
    container_name: liquidation_bot
    command: ["python", "run_liquidation_bot.py"]
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arbitrage_bot}
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD}@redis:6379
      HEALTH_AUTH_TOKEN: ${HEALTH_AUTH_TOKEN:-}
      DEV_MODE: ${DEV_MODE:-false}
    ports:
      - "${LIQ_BOT_HOST_BIND:-0.0.0.0}:${LIQ_BOT_PORT:-8082}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - arbitrage_network
    profiles:
      - liquidation

  # Dashboard API (FastAPI)
  dashboard-api:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arbitrage_bot}
      BOT_API_URL: http://arb-bot:8080
      HEALTH_AUTH_TOKEN: ${HEALTH_AUTH_TOKEN:-}
    ports:
      - "${DASHBOARD_API_HOST_BIND:-0.0.0.0}:${DASHBOARD_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      arb-bot:
        condition: service_started
    restart: unless-stopped
    networks:
      - arbitrage_network
    profiles:
      - dashboard

  # Dashboard Web (Next.js)
  dashboard-web:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard_web
    command: ["node", "dashboard/web/server.js"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${DASHBOARD_API_PORT:-8000}/api/v1
      PORT: "3000"
    ports:
      - "${DASHBOARD_WEB_HOST_BIND:-0.0.0.0}:${DASHBOARD_WEB_PORT:-3000}:3000"
    depends_on:
      - dashboard-api
    restart: unless-stopped
    networks:
      - arbitrage_network
    profiles:
      - dashboard

  # Prometheus (monitoring) — bound to localhost, requires 'monitoring' profile
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: arbitrage_prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - arbitrage_network
    profiles:
      - monitoring

  # Grafana (monitoring) — bound to localhost, requires 'monitoring' profile
  grafana:
    image: grafana/grafana:11.3.0
    container_name: arbitrage_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - arbitrage_network
    profiles:
      - monitoring

  # ARIA AI Agent (PM/PO)
  pm-agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: aria_agent
    env_file: [.env]
    environment:
      BOT_API_URL: http://arb-bot:8080
      DASHBOARD_API_URL: http://dashboard-api:8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arbitrage_bot}
    depends_on:
      arb-bot:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - arbitrage_network
    profiles:
      - agent

  # Optional: PgAdmin for database management — bound to localhost, requires 'tools' profile
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: arbitrage_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@arbitrage.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?Set PGADMIN_PASSWORD for pgadmin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - arbitrage_network
    profiles:
      - tools

  # Optional: Redis Commander for Redis management — bound to localhost, requires 'tools' profile
  redis-commander:
    image: rediscommander/redis-commander:0.8.1
    container_name: arbitrage_redis_commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      - HTTP_USER=${REDIS_COMMANDER_USER:-admin}
      - HTTP_PASSWORD=${REDIS_COMMANDER_PASSWORD:?Set REDIS_COMMANDER_PASSWORD}
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - arbitrage_network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  arbitrage_network:
    driver: bridge
