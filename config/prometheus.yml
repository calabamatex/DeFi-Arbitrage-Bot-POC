global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "arb-bot"
    static_configs:
      - targets: ["arb-bot:8080"]
        labels:
          bot_type: "arbitrage"

  - job_name: "liquidation-bot"
    static_configs:
      - targets: ["liquidation-bot:8080"]
        labels:
          bot_type: "liquidation"
