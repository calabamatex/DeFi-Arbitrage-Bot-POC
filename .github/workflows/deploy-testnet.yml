name: Deploy — Testnet

on:
  workflow_dispatch:
    inputs:
      chain:
        description: "Target testnet chain"
        required: true
        type: choice
        options:
          - polygon_amoy
          - arbitrum_sepolia
      deploy_contracts:
        description: "Deploy smart contracts"
        required: false
        type: boolean
        default: false
      deploy_bot:
        description: "Deploy bot (Docker image)"
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-testnet-${{ inputs.chain }}
  cancel-in-progress: false

jobs:
  deploy-contracts:
    name: Deploy Contracts (${{ inputs.chain }})
    if: inputs.deploy_contracts
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Deploy contracts
        env:
          POLYGON_AMOY_RPC_URL: ${{ secrets.POLYGON_AMOY_RPC_URL }}
          ARBITRUM_SEPOLIA_RPC_URL: ${{ secrets.ARBITRUM_SEPOLIA_RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
          ARBISCAN_API_KEY: ${{ secrets.ARBISCAN_API_KEY }}
        run: |
          forge script script/Deploy.s.sol \
            --rpc-url ${{ inputs.chain }} \
            --private-key $DEPLOYER_PRIVATE_KEY \
            --broadcast \
            --verify \
            -vvv

  deploy-bot:
    name: Deploy Bot (${{ inputs.chain }})
    if: inputs.deploy_bot
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t arb-bot:${{ github.sha }} .

      - name: Tag image
        run: |
          docker tag arb-bot:${{ github.sha }} arb-bot:testnet-${{ inputs.chain }}
          docker tag arb-bot:${{ github.sha }} arb-bot:testnet-latest

      # Add registry push steps here when a container registry is configured
      # - name: Push to registry
      #   run: docker push ...

  smoke-test:
    name: Smoke Test (${{ inputs.chain }})
    needs: [deploy-bot]
    if: always() && inputs.deploy_bot
    runs-on: ubuntu-latest
    environment: testnet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke test
        env:
          POLYGON_AMOY_RPC_URL: ${{ secrets.POLYGON_AMOY_RPC_URL }}
          ARBITRUM_SEPOLIA_RPC_URL: ${{ secrets.ARBITRUM_SEPOLIA_RPC_URL }}
          DRY_RUN: "true"
          EXECUTION_MODE: "testnet"
        run: python scripts/testnet_smoke_test.py --chain ${{ inputs.chain }}
